
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flashcards</title>

  <style>
    body {
      font-family: Verdana, sans-serif;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 25px;
    }

    .card-container {
      perspective: 1000px;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .card {
      width: 620px;
      max-width: 90%;
      min-height: 300px;
      padding: 30px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);

      cursor: pointer;

      display: flex;
      align-items: center;
      justify-content: center;

      transition: transform 0.6s;
      transform-style: preserve-3d;
      position: relative;

      line-height: 1.7;
      letter-spacing: 0.6px;

      white-space: pre-wrap;
      word-break: break-word;
      text-align: center;
    }

    .card.flip {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      backface-visibility: hidden;
      width: 100%;
    }

    .back {
      transform: rotateY(180deg);
    }

    .next-btn {
      margin-top: 25px;
      padding: 14px 35px;
      background-color: #cfe8ff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      text-transform: uppercase;
      cursor: pointer;
    }

    .next-btn:hover {
      background-color: #b7dcff;
    }

    .back-btn {
      margin-top: 15px;
      text-decoration: none;
      color: gray;
      font-size: 13px;
    }

  </style>
</head>

<body>

  <h1>Poison Tree Flashcards</h1>

  <div class="card-container">
    <div class="card" onclick="flipCard()">
      <div class="card-face front" id="question"></div>
      <div class="card-face back" id="answer"></div>
    </div>
  </div>

  <button class="next-btn" onclick="nextCard()">Next</button>

  <a class="back-btn" href="/helpme3758/">← Back to Home</a>

  <script>
    const flashcards = [

{
  question: "Conflict in Society",
  answer: "• Although the poem focused on the speaker's personal conflict with Cousin Kate, Rossetti uses this private story to expose a wider social conflict – the inequality between men and women.\n• And the conflict of women against social restrictions on reputation."
},
{
  question: "Anger",
  answer: "• The speaker shows anger to Cousin Kate and the Lord who betrayed her.\n• Anger is expressed through bitter tone, repetition and direct address of Kate.\n• Rossetti channels anger at Victorian gender inequality.\n• Speaker's anger also from the harsh social stigma and consequences forced upon her by society. Punishment for her not him."
},
{
  question: "Form",
  answer: "• Dramatic monologue\n• The speaker is unreliable, because of her opinions of Kate are coloured by resentment and some of her opinions contradict each other."
},
{
  question: "Passive language",
  answer: "• The lord is always the subject of a sentence, while women are passive to what he does.\n• Women don't have the power to control over their own life and fates.\n• Rossetti reinforces this point by using similes to compare women as objects, owning and exploiting by someone."
},
{
  question: "Contrast",
  answer: "• Contrast between innocence and corruption. How society cares about women's reputation.\n• Contrast between Kate's happiness and her failure. The imbalanced feeling in her mind."
},
{
  question: "Message",
  answer: "• Although the speaker and Cousin Kate seem to be in conflict, they are both victims of patriarchal society. Rossetti reflects male dominance, restrictions and prejudice (injustice) on women, exposes broader inequality of Victorian gender roles.\n• Rossetti ends with hope, the speaker's love for her son allows her to reclaim pride and identity. Proving the true value lies within the self, not in social approval."
},
{
  question: "Structure",
  answer: "• Chronological. (events happen and describe in order)\n• The speaker explains her relationship with the lord (with some foreshadowing of her bad ending) and Kate's betrayal then her son."
},
{
  question: "Repetition",
  answer: "• Poet uses anaphora to describe how the lord appealed and abandoned the speaker. It is used again to emphasise Kate's passiveness.\n• They have been treated in similar ways, they are the same, objects in patriarchy society."
},
{
  question: "Context",
  answer: "• In Victorian Era, women who had sex outside of wedlock were 'fallen women' and were frowned upon by the rest of society.\n• Rossetti spent some time volunteering with church organisation set up to help 'fallen women'."
},
{
  question: "\"To lead a shameless shameful life\"",
  answer: "• Oxymoron reflects her inner turmoil and self-destruction, she internalised society judgement so deeply that she begins to describe herself in the same cruel terms.\n• Alliteration: repetition of SH. Adds harsh and biting tone, echoing speaker's anger and bitterness.\n• SH also creates a shushing sound, suggests it is an inglorious thing."
},
{
  question: "\"He bound you with his ring\"",
  answer: "• Symbolism: they are getting married, bond together and putting on the ring.\n• BOUND: implies restriction and constriction. Marriage is another form of control.\n• Cousin Kate gains social respectability through marriage (wing – rise class), but also lost freedom (wing – freedom-contrast)."
},
{
  question: "\"He saw you… He watched you… He lifted you…\"",
  answer: "• Anaphora: the repetition of HE makes the lord seem predatory. HE is dominating their life.\n• Passive verb: Highlighting their lack of control over their own fates."
},
{
  question: "\"My fair-haired son, my shame, my pride\"",
  answer: "• Oxymoron: Although society calls her a disgrace, but it is her source of love and proud.\n• Suggest the conflict between her and society.\n• She transferred her anger to empowerment, she rejected judgemental society, instead focused on what she values most."
},
{
  question: "\"His plaything… He wore me… He changed me… So now I moan…\"",
  answer: "• Golden knot: She tries to compare herself with luxurious object, she still measures herself by the Lord's attention and approval.\n• Glove: Metaphors her body. The lord treated her like a disposable object, highlighting the lord's lack of love or respect and symbolising men's broader power over women in Victorian society.\n• Unclean thing and dove: she is considered unclean because she is no longer a virgin. Contrast with the dove, which is a symbol of innocence. Emphasize the effect and stigma that loss of purity brought to women."
},
{
  question: "\"I sit and howl in dust, You sit in gold and sing\"",
  answer: "• Sensory language – contrast.\n• Speaker used animal-liked language to emphasize the power and status imbalance in their relationship.\n• Humiliated – by the stigma.\n• Kate is likened to a caged songbird, a beautiful creature that is exploited and controlled."
}
    ];

    let currentIndex = 0;

    function updateCard() {
      document.getElementById("question").innerText = flashcards[currentIndex].question;
      document.getElementById("answer").innerText = flashcards[currentIndex].answer;
      document.querySelector(".card").classList.remove("flip");
    }

    function flipCard() {
      document.querySelector(".card").classList.toggle("flip");
    }

    function nextCard() {
      currentIndex = (currentIndex + 1) % flashcards.length;
      updateCard();
    }

    updateCard();
  </script>

</body>
</html>
