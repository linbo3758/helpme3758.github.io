<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>An Inspector Calls</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
      background: #ffffff;
      color: #1e293b;
      padding: 2rem 1.5rem;
    }

    .section {
      max-width: 1100px;
      margin: 0 auto 2.5rem auto;
    }

    .hero {
      border-bottom: 2px solid #eef2f6;
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }

    .hero h1 {
      font-size: 2.2rem;
      color: #A4D65E;
      font-weight: 800;
    }

    .hero p {
      color: #475569;
      font-size: 1rem;
    }

    h2 {
      font-size: 1.6rem;
      margin-bottom: 1rem;
      border-left: 5px solid #A4D65E;
      padding-left: 0.6rem;
    }

    /* grid */
    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    /* card */
    .card {
      background: #f9fafb;
      border-radius: 1.25rem;
      padding: 1.5rem 1rem 1rem;
      border: 1px solid #e9edf2;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 160px;
      text-align: center;
      transition: 0.25s;
    }

    .card:hover {
      border: 2px solid #A4D65E;
      transform: translateY(-2px);
    }

    .card h4 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .button {
      background: #A4D65E;
      border-radius: 40px;
      padding: 0.6rem;
      text-decoration: none;
      font-weight: 700;
      color: #1e3a2f;
      font-size: 0.9rem;
      display: inline-block;
      transition: 0.2s;
    }

    .button:hover {
      background: #8bc34a;
    }

    /* expandable card */
    .expand-card {
      background: #f9fafb;
      border-radius: 1.25rem;
      padding: 1.5rem 1.2rem;
      border: 1px solid #e9edf2;
      margin-bottom: 1.5rem;
    }

    .expand-card summary {
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      list-style: none;
    }

    .expand-card summary::-webkit-details-marker {
      display: none;
    }

    .expand-list {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .expand-list a {
      text-decoration: none;
      color: #A4D65E;
      font-weight: 600;
      transition: 0.2s;
    }

    .expand-list a:hover {
      color: #8bc34a;
      transform: translateX(4px);
    }

    /* footer */
    .footer {
      text-align: center;
      margin-top: 1rem;
    }

    .back-link {
      display: inline-block;
      margin-top: 1rem;
      text-decoration: none;
      font-weight: 500;
      color: #475569;
      background: #f1f5f9;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      font-size: 0.9rem;
      transition: 0.2s;
    }

    .back-link:hover {
      background: #e2e8f0;
      color: #1e293b;
    }

    @media (max-width: 700px) {
      .grid-3 {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 500px) {
      .grid-3 {
        grid-template-columns: 1fr;
      }
    }

  </style>
</head>

<body>

  <!-- Header -->
  <div class="section hero">
    <h1>An Inspector Calls</h1>
    <p>GCSE English Literature Revision</p>
  </div>

  <!-- Expandable Content -->
  <div class="section">

    <h2>Content</h2>

    <!-- THEMES -->
    <details class="expand-card">
      <summary>Themes</summary>
      <div class="expand-list">
        <a href="responsibility.html">Responsibility</a>
        <a href="class.html">Class</a>
        <a href="gender.html">Gender</a>
        <a href="guilt.html">Guilt</a>
        <a href="generation.html">Generation</a>
      </div>
    </details>

    <!-- CHARACTERS -->
    <details class="expand-card">
      <summary>Characters</summary>
      <div class="expand-list">
        <a href="mr-birling.html">Mr Birling</a>
        <a href="sheila.html">Sheila</a>
        <a href="inspector.html">Inspector</a>
        <a href="eric.html">Eric</a>
        <a href="mrs-birling.html">Mrs Birling</a>
      </div>
    </details>

  </div>

  <!-- Exam Skills -->
  <div class="section">
    <h2>Exam Skills</h2>

    <div class="grid-1">

      <div class="card">
        <h4>Critical Style</h4>
        <a href="critical-style.html" class="button">Open</a>
      </div>

  <!-- Footer -->
  <div class="section footer">
    <a href="../index.html" class="back-link">← Back to Home</a>
  </div>

</body>
</html>
