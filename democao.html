<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>终极土味 KTV</title>
  <style>
    /* 全屏黑背景 + 渐变闪烁 */
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(-45deg, #ff3cac, #784ba0, #ff9a3c, #3c3cff);
      background-size: 400% 400%;
      animation: bgFlash 6s ease infinite alternate;
      font-family: 'Arial Black', 'Impact', sans-serif;
      color: #fff;
      text-align: center;
    }

    @keyframes bgFlash {
      0% {background-position:0% 50%;}
      50% {background-position:100% 50%;}
      100% {background-position:0% 50%;}
    }

    /* 大字 KTV 文字 */
    h1 {
      font-size: 3.5rem;
      line-height: 1.5;
      text-shadow: 
        0 0 5px #fff,
        0 0 10px #ff3cac,
        0 0 20px #ff3cac,
        0 0 40px #ff3cac,
        0 0 80px #ff3cac;
      animation: neon 1.5s ease-in-out infinite alternate, jump 0.6s infinite;
      white-space: pre-line; /* 保留换行 */
    }

    /* 霓虹闪烁 */
    @keyframes neon {
      0% { text-shadow: 0 0 5px #fff,0 0 10px #ff3cac,0 0 20px #ff3cac,0 0 40px #ff3cac,0 0 80px #ff3cac; }
      50% { text-shadow: 0 0 10px #fff,0 0 20px #ff9a3c,0 0 30px #ff9a3c,0 0 50px #ff9a3c,0 0 100px #ff9a3c; }
      100% { text-shadow: 0 0 5px #fff,0 0 10px #ff3cac,0 0 20px #ff3cac,0 0 40px #ff3cac,0 0 80px #ff3cac; }
    }

    /* 跳动动画 */
    @keyframes jump {
      0%,100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-15px) scale(1.05); }
    }

    /* 响应式 */
    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
    }

    /* 樱花 */
    .sakura {
      position: absolute;
      width: 15px;
      height: 15px;
      background: pink;
      border-radius: 50%;
      opacity: 0.8;
      pointer-events: none;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% { transform: translateY(-10px) rotate(0deg); opacity:1; }
      100% { transform: translateY(100vh) rotate(360deg); opacity:0; }
    }
  </style>
</head>
<body>
  <h1>我可以给你当牛做马
只要你给我草就行</h1>

  <script>
    // 生成樱花
    const numSakura = 30;
    for(let i=0;i<numSakura;i++){
      const sakura = document.createElement('div');
      sakura.className = 'sakura';
      sakura.style.left = Math.random() * window.innerWidth + 'px';
      sakura.style.animationDuration = 3 + Math.random()*5 + 's';
      sakura.style.width = sakura.style.height = (10+Math.random()*10) + 'px';
      document.body.appendChild(sakura);
    }
  </script>
</body>
</html>
