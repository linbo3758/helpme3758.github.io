<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Literature | Edexcel</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
      background: #ffffff;
      color: #1e293b;
      padding: 2rem 1.5rem;
    }

    .section {
      max-width: 1100px;
      margin: 0 auto 2.5rem auto;
    }

    .hero {
      border-bottom: 2px solid #eef2f6;
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }

    .hero h1 {
      font-size: 2.2rem;
      color: #A4D65E;
      font-weight: 800;
    }

    .hero p {
      color: #475569;
      font-size: 1rem;
    }

    h2 {
      font-size: 1.6rem;
      margin-bottom: 1rem;
      border-left: 5px solid #A4D65E;
      padding-left: 0.6rem;
    }

    /* 固定布局 - 完全复用西班牙语页面风格 */
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    .card {
      background: #f9fafb;
      border-radius: 1.25rem;
      padding: 1.5rem 1rem 1rem;
      border: 1px solid #e9edf2;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 160px;
      text-align: center;
      transition: 0.25s;
    }

    .card:hover {
      border: 2px solid #A4D65E;
      transform: translateY(-2px);
    }

    .card h4 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      font-weight: 600;
      color: #1e293b;
    }

    .button {
      background: #A4D65E;
      border-radius: 40px;
      padding: 0.6rem;
      text-decoration: none;
      font-weight: 700;
      color: #1e3a2f;
      font-size: 0.9rem;
      display: inline-block;
      transition: background 0.2s;
    }

    .button:hover {
      background: #8bc34a;
    }

    /* 手机适配 - 完全继承原设计 */
    @media (max-width: 700px) {
      .grid-3 {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 500px) {
      .grid-2, .grid-3 {
        grid-template-columns: 1fr;
      }
    }

    /* 返回首页按钮样式 - 融入整体设计语言 */
    .back-link {
      display: inline-block;
      margin-top: 1rem;
      text-decoration: none;
      font-weight: 500;
      color: #475569;
      background: #f1f5f9;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      font-size: 0.9rem;
      transition: 0.2s;
    }

    .back-link:hover {
      background: #e2e8f0;
      color: #1e293b;
    }

    .footer {
      text-align: center;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

  <div class="section hero">
    <h1>English Literature</h1>
    <p>Edexcel Examination Board</p>
  </div>

  <!-- Paper 1 区块 - 上方两个卡片 -->
  <div class="section">
    <h2>Paper 1</h2>
    <div class="grid-2">
      <div class="card">
        <h4>Merchant of Venice</h4>
        <a href="flashcards-merchant-venice.html" class="button">Open</a>
      </div>
      <div class="card">
        <h4>An Inspector Calls</h4>
        <a href="AIC/aic-menu.html" class="button">Open</a>
      </div>
    </div>
  </div>

  <!-- Paper 2 区块 - 下方两个卡片 -->
  <div class="section">
    <h2>Paper 2</h2>
    <div class="grid-2">
      <div class="card">
        <h4>Poetry Anthology</h4>
        <a href="PA/PoetryAnthology-menu.html" class="button">Open</a>
      </div>
      <div class="card">
        <h4>Pride and Prejudice</h4>
        <a href="flashcards-pride-prejudice.html" class="button">Open</a>
      </div>
    </div>
  </div>

  <!-- 底部返回主页链接，风格统一 -->
  <div class="section footer">
    <a href="index.html" class="back-link">← Back to Home</a>
  </div>

</body>
</html>
