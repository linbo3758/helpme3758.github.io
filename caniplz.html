<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>土味霓虹炫技</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
      font-family: 'Arial Black', sans-serif;
      overflow: hidden;
    }

    /* 霓虹闪烁背景 */
    @keyframes bgFlash {
      0% {background: linear-gradient(45deg, #ff3cac, #784ba0);}
      25% {background: linear-gradient(45deg, #ff9a3c, #ff3c3c);}
      50% {background: linear-gradient(45deg, #3cfff7, #3c3cff);}
      75% {background: linear-gradient(45deg, #ff3cde, #3cff4c);}
      100% {background: linear-gradient(45deg, #ff3cac, #784ba0);}
    }
    body {
      animation: bgFlash 5s infinite alternate;
      background-size: 400% 400%;
    }

    /* KTV 大字文字 */
    h1 {
      font-size: 4rem;
      color: #fff;
      text-align: center;
      text-transform: uppercase;
      animation: neon 1.5s ease-in-out infinite alternate, jump 0.5s infinite;
      text-shadow:
        0 0 5px #fff,
        0 0 10px #ff3cac,
        0 0 20px #ff3cac,
        0 0 40px #ff3cac,
        0 0 80px #ff3cac;
    }

    /* 霓虹闪烁 */
    @keyframes neon {
      0% { text-shadow: 0 0 5px #fff,0 0 10px #ff3cac,0 0 20px #ff3cac,0 0 40px #ff3cac,0 0 80px #ff3cac; }
      50% { text-shadow: 0 0 10px #fff,0 0 20px #ff9a3c,0 0 30px #ff9a3c,0 0 50px #ff9a3c,0 0 100px #ff9a3c; }
      100% { text-shadow: 0 0 5px #fff,0 0 10px #ff3cac,0 0 20px #ff3cac,0 0 40px #ff3cac,0 0 80px #ff3cac; }
    }

    /* 跳动动画 */
    @keyframes jump {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px) scale(1.05); }
    }

    /* 响应式 */
    @media (max-width: 600px) {
      h1 { font-size: 2.5rem; }
    }
  </style>
</head>
<body>
  <h1>我想看你戴眼镜</h1>
</body>
</html>
